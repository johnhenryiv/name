<style>
  :root {
    --primary: #6c63ff;
    --primary-dark: #4a42cc;
    --secondary: #ff6584;
    --bg: #0f0f1a;
    --bg-card: #1a1a2e;
    --bg-input: #16213e;
    --text: #e8e8f0;
    --text-muted: #888;
    --border: #2a2a4a;
    --success: #4caf50;
    --danger: #f44336;
    --warning: #ff9800;
    --radius: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Navigation */
  nav {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    height: 60px;
  }

  .nav-brand {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--primary);
    text-decoration: none;
    flex-shrink: 0;
  }

  .nav-links {
    display: flex;
    gap: 4px;
    margin-left: auto;
    flex-wrap: wrap;
  }

  .nav-links a {
    color: var(--text-muted);
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 0.9rem;
    transition: all 0.2s;
  }

  .nav-links a:hover, .nav-links a.active {
    color: var(--primary);
    background: rgba(108,99,255,0.1);
  }

  /* Layout */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  .page-title {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .page-subtitle {
    color: var(--text-muted);
    margin-bottom: 24px;
  }

  /* Cards */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
  }

  .card + .card { margin-top: 16px; }

  .card-title {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--primary);
  }

  /* Grid */
  .grid { display: grid; gap: 16px; }
  .grid-2 { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
  .grid-3 { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }

  /* Forms */
  .form-group { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  input, select, textarea {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 14px;
    font-size: 0.95rem;
    font-family: inherit;
    transition: border-color 0.2s;
  }

  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
  }

  textarea { resize: vertical; min-height: 80px; }

  select option { background: var(--bg-card); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
  }

  .btn-primary {
    background: var(--primary);
    color: white;
  }

  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }

  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }

  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:hover { opacity: 0.85; }

  .btn-success { background: var(--success); color: white; }
  .btn-sm { padding: 6px 14px; font-size: 0.82rem; }
  .btn-full { width: 100%; }

  /* Badges */
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
  }

  .badge-primary { background: rgba(108,99,255,0.2); color: var(--primary); }
  .badge-success { background: rgba(76,175,80,0.2); color: var(--success); }
  .badge-danger { background: rgba(244,67,54,0.2); color: var(--danger); }
  .badge-warning { background: rgba(255,152,0,0.2); color: var(--warning); }

  /* Stars */
  .stars { color: #ffc107; font-size: 1.1rem; }

  /* Profile card */
  .profile-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  .avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  .profile-info { flex: 1; }
  .profile-name { font-weight: 700; font-size: 1.1rem; }
  .profile-meta { color: var(--text-muted); font-size: 0.85rem; margin-top: 2px; }

  /* Interest tags */
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .tag {
    background: rgba(108,99,255,0.15);
    color: var(--primary);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.78rem;
  }

  /* Score bar */
  .score-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 8px;
  }

  .score-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    border-radius: 3px;
    transition: width 0.6s ease;
  }

  /* Chat */
  .chat-window {
    height: 400px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 16px;
    background: var(--bg-input);
    border-radius: 8px;
    margin-bottom: 16px;
  }

  .message-bubble {
    max-width: 70%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 0.9rem;
    line-height: 1.4;
    word-break: break-word;
  }

  .message-sent {
    background: var(--primary);
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .message-received {
    background: var(--bg-card);
    border: 1px solid var(--border);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  .message-time {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 4px;
    text-align: right;
  }

  .message-received .message-time { text-align: left; }

  /* Alerts */
  .alert {
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 0.9rem;
  }

  .alert-error { background: rgba(244,67,54,0.15); color: #ff6b6b; border: 1px solid rgba(244,67,54,0.3); }
  .alert-success { background: rgba(76,175,80,0.15); color: #6bcb77; border: 1px solid rgba(76,175,80,0.3); }
  .alert-info { background: rgba(108,99,255,0.15); color: #a29bfe; border: 1px solid rgba(108,99,255,0.3); }

  /* Loading */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Step indicator */
  .steps {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .step {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    transition: background 0.3s;
  }

  .step.active { background: var(--primary); }
  .step.done { background: var(--success); }

  /* Responsive */
  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .nav-links a { padding: 6px 8px; font-size: 0.8rem; }
    .page-title { font-size: 1.4rem; }
  }

  /* Utilities */
  .text-center { text-align: center; }
  .text-muted { color: var(--text-muted); }
  .mt-1 { margin-top: 8px; }
  .mt-2 { margin-top: 16px; }
  .mt-3 { margin-top: 24px; }
  .mb-1 { margin-bottom: 8px; }
  .mb-2 { margin-bottom: 16px; }
  .flex { display: flex; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .gap-1 { gap: 8px; }
  .hidden { display: none !important; }
</style>
